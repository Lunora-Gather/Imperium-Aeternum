name: Deploy GitHub Pages

on:
  push:
    branches:
      - optimize/v39-action-plan
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  build:
    name: Build V43 preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Targeted tests
        run: |
          npx vitest run src/gameplay/__tests__/commandExecutionPlan.test.ts
          npx vitest run src/gameplay/__tests__/actionPlanSummary.test.ts
          npx vitest run src/gameplay/__tests__/strategicHq.test.ts
          npx vitest run src/gameplay/__tests__/economyAdvisor.test.ts
          npx vitest run src/gameplay/__tests__/warAssessment.test.ts
          npx vitest run src/gameplay/__tests__/warPreview.test.ts
          npx vitest run src/gameplay/__tests__/warOpportunityAdvisor.test.ts
          npx vitest run src/gameplay/__tests__/aiWarDecision.test.ts
          npx vitest run src/gameplay/__tests__/aiWarActionAdapter.test.ts
          npx vitest run src/engine/__tests__/aiWarPlannerIntegration.test.ts

      - name: Build Pages artifact
        env:
          VITE_BASE: /Imperium-Aeternum/
        run: |
          npm run pages:build
          cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy V43 preview
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
