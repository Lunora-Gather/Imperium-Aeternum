name: PR Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, targeted tests, validation and Pages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript strict gate
        run: |
          set +e
          npm run typecheck -- --pretty false > typecheck-report.txt 2>&1
          status=$?
          echo "TypeScript exit code: ${status}"
          echo "First 80 report lines:"
          sed -n '1,80p' typecheck-report.txt
          exit ${status}
      - name: Upload TypeScript report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: typecheck-report
          path: typecheck-report.txt
          retention-days: 14
      - name: Battle resolution tests
        run: npx vitest run src/engine/__tests__/battleResolution.test.ts
      - name: AI peace settlement tests
        run: npx vitest run src/engine/__tests__/aiPeaceSettlement.test.ts
      - name: Turn isolation tests
        run: npx vitest run src/engine/__tests__/turnIsolation.test.ts
      - name: Law per-turn pure tests
        run: npx vitest run src/engine/__tests__/lawEffectsPure.test.ts
      - name: Ambition sync tests
        run: npx vitest run src/gameplay/__tests__/ambitionsSync.test.ts
      - name: Victory route dashboard tests
        run: npx vitest run src/gameplay/__tests__/victoryRoutes.test.ts
      - name: Turn debrief tests
        run: npx vitest run src/gameplay/__tests__/turnDebrief.test.ts
      - name: Nation style and diplomatic intel tests
        run: npx vitest run src/gameplay/__tests__/nationIntel.test.ts
      - name: Chronicle digest tests
        run: npx vitest run src/gameplay/__tests__/chronicleDigest.test.ts
      - name: Contextual guidance tests
        run: npx vitest run src/gameplay/__tests__/contextualGuidance.test.ts
      - name: Difficulty guide tests
        run: npx vitest run src/gameplay/__tests__/difficultyGuide.test.ts
      - name: Launch handbook tests
        run: npx vitest run src/gameplay/__tests__/launchHandbook.test.ts
      - name: Readiness diagnostics tests
        run: npx vitest run src/gameplay/__tests__/readiness.test.ts
      - name: State hygiene repair tests
        run: npx vitest run src/gameplay/__tests__/stateHygiene.test.ts
      - name: Save recovery preview tests
        run: npx vitest run src/gameplay/__tests__/saveRecovery.test.ts
      - name: Guided onboarding tests
        run: npx vitest run src/gameplay/__tests__/onboarding.test.ts
      - name: Navigation tab contract tests
        run: npx vitest run src/gameplay/__tests__/navigationTabs.test.ts
      - name: Launch hub intelligence tests
        run: npx vitest run src/gameplay/__tests__/launchHub.test.ts
      - name: Empire roadmap tests
        run: npx vitest run src/gameplay/__tests__/empireRoadmap.test.ts
      - name: Next turn preview tests
        run: npx vitest run src/gameplay/__tests__/turnPreview.test.ts
      - name: Pre-turn council tests
        run: npx vitest run src/gameplay/__tests__/preTurnCouncil.test.ts
      - name: Page history navigation tests
        run: npx vitest run src/gameplay/__tests__/pageHistory.test.ts
      - name: Turn report action routing tests
        run: npx vitest run src/gameplay/__tests__/turnReportActions.test.ts
      - name: Command center action tests
        run: npx vitest run src/gameplay/__tests__/commandCenterActions.test.ts
      - name: Save compaction tests
        run: npx vitest run src/store/__tests__/persistenceCompact.test.ts
      - name: Turn purity tests
        run: npx vitest run src/engine/__tests__/turnPurity.test.ts
      - name: Long-run simulation diagnostics
        run: npx vitest run src/engine/__tests__/longRunSimulation.test.ts
      - name: Full regression suite
        run: npm run test
      - name: Data and scenario validation
        run: npm run validate
      - name: Pages-compatible production build
        run: npm run pages:build
        env:
          VITE_BASE: /Imperium-Aeternum/
