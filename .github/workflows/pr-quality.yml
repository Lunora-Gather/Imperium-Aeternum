name: PR Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, targeted tests, validation and Pages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript strict gate
        run: |
          set +e
          npm run typecheck -- --pretty false > typecheck-report.txt 2>&1
          status=$?
          echo "TypeScript exit code: ${status}"
          echo "First 80 report lines:"
          sed -n '1,80p' typecheck-report.txt
          exit ${status}
      - name: Upload TypeScript report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: typecheck-report
          path: typecheck-report.txt
          retention-days: 14
      - name: Battle resolution tests
        run: npx vitest run src/engine/__tests__/battleResolution.test.ts
      - name: Save compaction tests
        run: npx vitest run src/store/__tests__/persistenceCompact.test.ts
      - name: Turn purity tests
        run: npx vitest run src/engine/__tests__/turnPurity.test.ts
      - name: Long-run simulation diagnostics
        run: npx vitest run src/engine/__tests__/longRunSimulation.test.ts
      - name: Data and scenario validation
        run: npm run validate
      - name: Pages-compatible production build
        run: npm run pages:build
        env:
          VITE_BASE: /Imperium-Aeternum/
