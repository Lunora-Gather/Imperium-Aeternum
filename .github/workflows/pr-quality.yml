name: PR Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality
  cancel-in-progress: true

jobs:
  verify:
    name: Tests, data validation and Pages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript debt report (non-blocking)
        run: npm run typecheck
        continue-on-error: true
      - name: Unit and simulation tests
        run: npm run test
      - name: Data and scenario validation
        run: npm run validate
      - name: Pages-compatible production build
        run: npm run pages:build
        env:
          VITE_BASE: /Imperium-Aeternum/
