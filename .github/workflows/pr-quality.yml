name: PR Quality Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality
  cancel-in-progress: true

jobs:
  verify:
    name: Targeted tests, data validation and Pages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript debt report (non-blocking)
        run: npm run typecheck
        continue-on-error: true
      - name: Battle resolution tests
        run: npx vitest run src/engine/__tests__/battleResolution.test.ts
      - name: Save compaction tests
        run: npx vitest run src/store/__tests__/persistenceCompact.test.ts
      - name: Turn purity tests
        run: npx vitest run src/engine/__tests__/turnPurity.test.ts
      - name: Long-run simulation diagnostics (non-blocking)
        run: npx vitest run src/engine/__tests__/longRunSimulation.test.ts
        continue-on-error: true
      - name: Data and scenario validation
        run: npm run validate
      - name: Pages-compatible production build
        run: npm run pages:build
        env:
          VITE_BASE: /Imperium-Aeternum/
