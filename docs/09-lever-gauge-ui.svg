<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Microsoft YaHei, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#444"/></marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/><feOffset dx="1" dy="1" result="o"/><feFlood flood-color="#000" flood-opacity="0.2"/><feComposite in2="o" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="520" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">杆组仪表盘 · UI 实时可视化配图</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#7f8c8d">玩家在 Dashboard 直接看到五根杆当前刻度 + 阈值标记 + 阻尼触发区</text>

  <!-- 仪表盘容器 -->
  <rect x="40" y="75" width="820" height="380" rx="8" fill="#f5f2e8" stroke="#c9a44e" stroke-width="2" filter="url(#sh)"/>
  <text x="60" y="100" font-size="13" font-weight="bold" fill="#c9a44e">◈ 杠杆仪表 · 五根杆的实时负重</text>
  <text x="60" y="118" font-size="10" fill="#7f8c8d" font-style="italic">拉杆即有代价 · 超阈值触发阻尼 · 杆不会断但越来越重</text>

  <!-- ===== 五根杆（每根一行）===== -->
  <!-- 杆 ① 财政 -->
  <g transform="translate(60,140)">
    <text x="0" y="14" font-size="12" font-weight="600" fill="#e67e22">① 财政</text>
    <!-- 杆条背景 -->
    <rect x="90" y="4" width="540" height="16" rx="8" fill="#e8e4d8"/>
    <!-- 阈值标记线（60%） -->
    <line x1="414" y1="0" x2="414" y2="24" stroke="#c0392b" stroke-width="2" opacity="0.6"/>
    <text x="414" y="-2" text-anchor="middle" font-size="8" fill="#c0392b">阈值60</text>
    <!-- 当前负重填充（45，安全） -->
    <rect x="90" y="4" width="243" height="16" rx="8" fill="#e67e22" opacity="0.5"/>
    <text x="640" y="14" font-size="12" font-weight="700" fill="#27ae60">45</text>
    <text x="670" y="14" font-size="9" fill="#27ae60">安全</text>
  </g>

  <!-- 杆 ② 军事（超阈值，触发阻尼） -->
  <g transform="translate(60,180)">
    <text x="0" y="14" font-size="12" font-weight="600" fill="#e91e63">② 军事</text>
    <rect x="90" y="4" width="540" height="16" rx="8" fill="#e8e4d8"/>
    <line x1="468" y1="0" x2="468" y2="24" stroke="#c0392b" stroke-width="2" opacity="0.6"/>
    <text x="468" y="-2" text-anchor="middle" font-size="8" fill="#c0392b">阈值70</text>
    <!-- 负重 72，超阈值 -->
    <rect x="90" y="4" width="389" height="16" rx="8" fill="#e91e63" opacity="0.5"/>
    <!-- 阻尼区斜纹（超阈值部分） -->
    <rect x="468" y="4" width="21" height="16" fill="url(#stripe)" opacity="0.4"/>
    <pattern id="stripe" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#c0392b" opacity="0.3"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#c0392b" stroke-width="2"/>
    </pattern>
    <text x="640" y="14" font-size="12" font-weight="700" fill="#c0392b">72</text>
    <text x="670" y="14" font-size="9" fill="#c0392b">⚠ 阻尼</text>
    <!-- 阻尼描述 -->
    <text x="90" y="34" font-size="9" fill="#c0392b">厌战→兵变 + 和约割让/赔款</text>
  </g>

  <!-- 杆 ③ 扩张 -->
  <g transform="translate(60,225)">
    <text x="0" y="14" font-size="12" font-weight="600" fill="#27ae60">③ 扩张</text>
    <rect x="90" y="4" width="540" height="16" rx="8" fill="#e8e4d8"/>
    <line x1="468" y1="0" x2="468" y2="24" stroke="#c0392b" stroke-width="2" opacity="0.6"/>
    <text x="468" y="-2" text-anchor="middle" font-size="8" fill="#c0392b">阈值70</text>
    <rect x="90" y="4" width="270" height="16" rx="8" fill="#27ae60" opacity="0.5"/>
    <text x="640" y="14" font-size="12" font-weight="700" fill="#27ae60">50</text>
    <text x="670" y="14" font-size="9" fill="#27ae60">安全</text>
  </g>

  <!-- 杆 ④ 改革 -->
  <g transform="translate(60,265)">
    <text x="0" y="14" font-size="12" font-weight="600" fill="#1976d2">④ 改革</text>
    <rect x="90" y="4" width="540" height="16" rx="8" fill="#e8e4d8"/>
    <line x1="414" y1="0" x2="414" y2="24" stroke="#c0392b" stroke-width="2" opacity="0.6"/>
    <text x="414" y="-2" text-anchor="middle" font-size="8" fill="#c0392b">阈值60</text>
    <rect x="90" y="4" width="270" height="16" rx="8" fill="#1976d2" opacity="0.5"/>
    <text x="640" y="14" font-size="12" font-weight="700" fill="#27ae60">50</text>
    <text x="670" y="14" font-size="9" fill="#27ae60">安全</text>
  </g>

  <!-- 杆 ⑤ 外交（接近阈值） -->
  <g transform="translate(60,305)">
    <text x="0" y="14" font-size="12" font-weight="600" fill="#8e24aa">⑤ 外交</text>
    <rect x="90" y="4" width="540" height="16" rx="8" fill="#e8e4d8"/>
    <line x1="468" y1="0" x2="468" y2="24" stroke="#c0392b" stroke-width="2" opacity="0.6"/>
    <text x="468" y="-2" text-anchor="middle" font-size="8" fill="#c0392b">阈值70</text>
    <!-- 负重 65，接近阈值（70%×70=49，65>49 接近） -->
    <rect x="90" y="4" width="351" height="16" rx="8" fill="#8e24aa" opacity="0.5"/>
    <text x="640" y="14" font-size="12" font-weight="700" fill="#e67e22">65</text>
    <text x="670" y="14" font-size="9" fill="#e67e22">⚠ 接近</text>
  </g>

  <!-- 图例 -->
  <g transform="translate(60,360)">
    <rect width="780" height="80" rx="6" fill="#fff" stroke="#bdc3c7"/>
    <text x="390" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#34495e">图例 · 杆条读法</text>
    <!-- 安全示例 -->
    <rect x="20" y="35" width="60" height="10" rx="5" fill="#27ae60" opacity="0.5"/>
    <text x="90" y="44" font-size="9" fill="#555">安全（&lt;70%阈值）</text>
    <!-- 接近示例 -->
    <rect x="200" y="35" width="60" height="10" rx="5" fill="#e67e22" opacity="0.5"/>
    <text x="270" y="44" font-size="9" fill="#555">⚠ 接近（70-100%阈值）</text>
    <!-- 阻尼触发示例 -->
    <rect x="420" y="35" width="40" height="10" rx="5" fill="#c0392b" opacity="0.5"/>
    <rect x="460" y="35" width="20" height="10" fill="url(#stripe)" opacity="0.4"/>
    <text x="490" y="44" font-size="9" fill="#555">⚠ 阻尼触发（≥阈值，红斜纹区）</text>
    <!-- 阈值线 -->
    <line x1="20" y1="60" x2="40" y2="60" stroke="#c0392b" stroke-width="2" opacity="0.6"/>
    <text x="50" y="64" font-size="9" fill="#555">阈值标记线</text>
    <text x="200" y="64" font-size="9" fill="#95a5a6" font-style="italic">杆不会断，但会越来越重——永恒之道在于稳</text>
  </g>

  <!-- 底部螺旋上升标注 -->
  <text x="450" y="490" text-anchor="middle" font-size="11" fill="#8e24aa" font-weight="600">
    本轮螺旋上升：UI 可视化层 —— 杆组从"数学载体"升级为"玩家可感知的实时仪表"
  </text>
</svg>
