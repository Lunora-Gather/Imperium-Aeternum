    <text x="110" y="48" text-anchor="middle" font-size="11" fill="#555">主杆：税率 / 建设 / 贸易</text>
    <line x1="20" y1="68" x2="200" y2="68" stroke="#f39c12" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="68" r="6" fill="#f39c12"/><circle cx="200" cy="68" r="6" fill="#f39c12"/>
    <text x="110" y="90" text-anchor="middle" font-size="10" fill="#c0392b">联动：满意度↓ 腐败↑ 贸易↓</text>
    <text x="110" y="108" text-anchor="middle" font-size="10" fill="#c0392b">阻尼：腐败吞收入</text>
    <text x="110" y="123" text-anchor="middle" font-size="9" fill="#27ae60">✅ 闭环</text>
  </g>
  <g transform="translate(320,120)">
    <rect width="220" height="130" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#c2185b">② 军事杆组</text>
    <text x="110" y="48" text-anchor="middle" font-size="11" fill="#555">主杆：征兵 / 宣战 / 动员</text>
    <line x1="20" y1="68" x2="200" y2="68" stroke="#e91e63" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="68" r="6" fill="#e91e63"/><circle cx="200" cy="68" r="6" fill="#e91e63"/>
    <text x="110" y="90" text-anchor="middle" font-size="10" fill="#c0392b">联动：厌战↑ 粮耗↑ 人口↓</text>
    <text x="110" y="108" text-anchor="middle" font-size="10" fill="#c0392b">阻尼：厌战→兵变 + 和约</text>
    <text x="110" y="123" text-anchor="middle" font-size="9" fill="#27ae60">✅ 闭环</text>
  </g>
  <g transform="translate(560,120)">
    <rect width="220" height="130" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">③ 扩张杆组</text>
    <text x="110" y="48" text-anchor="middle" font-size="11" fill="#555">主杆：占省 / 附庸 / 建设</text>
    <line x1="20" y1="68" x2="200" y2="68" stroke="#27ae60" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="68" r="6" fill="#27ae60"/><circle cx="200" cy="68" r="6" fill="#27ae60"/>
    <text x="110" y="90" text-anchor="middle" font-size="10" fill="#c0392b">联动：行政超载 文化冲突</text>
    <text x="110" y="108" text-anchor="middle" font-size="10" fill="#c0392b">阻尼：overExtension + 分裂</text>
    <text x="110" y="123" text-anchor="middle" font-size="9" fill="#27ae60">✅ 闭环</text>
  </g>
  <g transform="translate(800,120)">
    <rect width="220" height="130" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d47a1">④ 改革杆组</text>
    <text x="110" y="48" text-anchor="middle" font-size="11" fill="#555">主杆：政策 / 法律 / 政体</text>
    <line x1="20" y1="68" x2="200" y2="68" stroke="#1976d2" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="68" r="6" fill="#1976d2"/><circle cx="200" cy="68" r="6" fill="#1976d2"/>
