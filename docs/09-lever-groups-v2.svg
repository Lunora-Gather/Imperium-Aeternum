  <!-- ════════ 图 2：财政杆组深度配图 ════════ -->
  <text x="700" y="300" text-anchor="middle" font-size="18" font-weight="bold" fill="#e67e22">图 2 · 财政杆组深度配图（环型自反馈）</text>

