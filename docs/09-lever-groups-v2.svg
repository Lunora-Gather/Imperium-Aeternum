    <text x="0" y="6" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">税率 ↑（玩家拉杆）</text>
  </g>

  <!-- 左分支：金+ -->
  <path d="M 610 400 Q 500 400 450 350" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <g transform="translate(370,330)">
    <rect width="160" height="40" rx="6" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
    <text x="80" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">国库金 +（短期收益）</text>
  </g>

  <!-- 右分支：满意度- -->
  <path d="M 790 400 Q 900 400 950 350" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <g transform="translate(870,330)">
    <rect width="160" height="40" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
    <text x="80" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">民众满意度 −（联动 1）</text>
  </g>

  <!-- 满意度→不满→叛乱 -->
  <path d="M 950 370 L 950 420" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <g transform="translate(870,420)">
    <rect width="160" height="40" rx="6" fill="#ffebee" stroke="#c0392b" stroke-width="2"/>
    <text x="80" y="25" text-anchor="middle" font-size="12" fill="#b71c1c">不满度 + → 叛乱风险 +</text>
  </g>

  <!-- 左分支：人口增长- -->
  <path d="M 450 370 L 450 420" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <g transform="translate(370,420)">
